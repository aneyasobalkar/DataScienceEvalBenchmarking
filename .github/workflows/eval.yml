name: Run Eval

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y tmux

      - name: Install harbor
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install harbor asciinema

      - name: Run all tasks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          source .venv/bin/activate
          for task in \
            samples/dabstep-* \
            samples/radial-velocity-period \
            samples/lottery-ticket-mnist \
            samples/simpsons-paradox \
            samples/ab-test-violations \
            samples/geospatial-anomaly-routes \
            samples/geospatial-anomaly-synthetic; do
            echo "=== $task ==="
            harbor run -p "$task" \
              -a terminus-2 \
              -m gemini/gemini-3.5-flash \
              --ae GEMINI_API_KEY="$GEMINI_API_KEY" \
              -k 3 \
              -y || true
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: jobs/
