name: Custom Task Eval

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "samples/bengali-fake-news/**"
      - "samples/cern-resonance-peaks/**"
      - "samples/gene-expression-clustering/**"
      - "samples/lottery-ticket-mnist/**"
      - "samples/radial-velocity-period/**"
      - "samples/simpsons-paradox/**"
      - "samples/ab-test-violations/**"
      - "samples/geospatial-anomaly-routes/**"
      - "samples/geospatial-anomaly-synthetic/**"
      - ".github/workflows/custom-eval.yml"

jobs:
  eval:
    name: "${{ matrix.task }}"
    runs-on: ubuntu-latest
    # lottery-ticket-mnist: ~30 min agent + ~15 min Docker build + overhead
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        task:
          - bengali-fake-news
          - cern-resonance-peaks
          - gene-expression-clustering
          - lottery-ticket-mnist
          - radial-velocity-period
          - simpsons-paradox
          - ab-test-violations
          - geospatial-anomaly-routes
          - geospatial-anomaly-synthetic

    steps:
      - name: Checkout (with LFS for bengali-fake-news CSVs)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y tmux

      - name: Install harbor
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --quiet harbor==0.8.0 asciinema

      - name: Run harbor eval
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          source .venv/bin/activate
          harbor run \
            -p "samples/${{ matrix.task }}" \
            -a terminus-2 \
            -m gemini/gemini-3.5-flash \
            -k 3 \
            -y

      - name: Upload job results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.task }}
          path: jobs/
          retention-days: 30
          if-no-files-found: warn
